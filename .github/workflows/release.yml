name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: build linux (${{ matrix.archive_platform }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            archive_platform: x86_64-linux
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            archive_platform: aarch64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Linux build cache
        uses: actions/cache@v4
        with:
          path: |
            .cargo-home/registry/index
            .cargo-home/registry/cache
            .cargo-home/git/db
            target/${{ matrix.target }}
          key: release-linux-${{ matrix.archive_platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-linux-${{ matrix.archive_platform }}-

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in Ubuntu 20.04 container
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cargo-home
          docker run --rm --platform "${{ matrix.platform }}" \
            -v "$PWD:/work" \
            -w /work \
            -e CARGO_HOME=/work/.cargo-home \
            -e CARGO_TARGET_DIR=/work/target \
            ubuntu:20.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y ca-certificates curl build-essential pkg-config libssl-dev git xz-utils
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
              . "$CARGO_HOME/env"
              rustup target add "${{ matrix.target }}"
              cargo build --release --locked --target "${{ matrix.target }}"
            '

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NAME="parsync-${VERSION}-${{ matrix.archive_platform }}"
          BIN_PATH="target/${{ matrix.target }}/release/parsync"
          mkdir -p dist
          cp "${BIN_PATH}" dist/parsync
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE
          chmod 755 dist/parsync
          chmod 644 dist/README.md dist/LICENSE
          tar -C dist -czf "${NAME}.tar.gz" parsync README.md LICENSE
          sha256sum "${NAME}.tar.gz" > "${NAME}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parsync-${{ matrix.archive_platform }}
          path: |
            parsync-${{ github.ref_name }}-${{ matrix.archive_platform }}.tar.gz
            parsync-${{ github.ref_name }}-${{ matrix.archive_platform }}.sha256
          if-no-files-found: error

  build-macos:
    name: build macos (${{ matrix.archive_platform }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            archive_platform: x86_64-macos
          - target: aarch64-apple-darwin
            archive_platform: aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore macOS build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-${{ matrix.archive_platform }}

      - name: Install macOS build dependencies
        run: |
          brew update
          brew install pkg-config openssl@3

      - name: Build release binary
        run: |
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig"
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NAME="parsync-${VERSION}-${{ matrix.archive_platform }}"
          BIN_PATH="target/${{ matrix.target }}/release/parsync"
          mkdir -p dist
          cp "${BIN_PATH}" dist/parsync
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE
          chmod 755 dist/parsync
          chmod 644 dist/README.md dist/LICENSE
          tar -C dist -czf "${NAME}.tar.gz" parsync README.md LICENSE
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parsync-${{ matrix.archive_platform }}
          path: |
            parsync-${{ github.ref_name }}-${{ matrix.archive_platform }}.tar.gz
            parsync-${{ github.ref_name }}-${{ matrix.archive_platform }}.sha256
          if-no-files-found: error

  build-windows:
    name: build windows (x86_64-windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore Windows build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-x86_64

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Version = "${env:GITHUB_REF_NAME}"
          $Name = "parsync-$Version-x86_64-windows"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/parsync.exe" "dist/parsync.exe"
          Copy-Item "README.md" "dist/README.md"
          Copy-Item "LICENSE" "dist/LICENSE"
          Compress-Archive -Path "dist/parsync.exe","dist/README.md","dist/LICENSE" -DestinationPath "$Name.zip" -Force
          (Get-FileHash "$Name.zip" -Algorithm SHA256).Hash.ToLower() + "  $Name.zip" | Out-File -NoNewline "$Name.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parsync-x86_64-windows
          path: |
            parsync-${{ github.ref_name }}-x86_64-windows.zip
            parsync-${{ github.ref_name }}-x86_64-windows.sha256
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -print -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
